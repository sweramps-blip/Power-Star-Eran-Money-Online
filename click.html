<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Loading Reward… – Vexora Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --gold:#c9a227; --gold2:#e8c547; --gold3:#fff5b0;
  --navy:#050a12; --navy2:#0a1628;
}

html,body{
  height:100%; background:var(--navy);
  font-family:'Rajdhani',sans-serif;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  overflow:hidden; position:relative;
}

/* Grid bg */
body::before{
  content:''; position:fixed; inset:0;
  background-image:
    linear-gradient(rgba(201,162,39,0.055) 1px,transparent 1px),
    linear-gradient(90deg,rgba(201,162,39,0.055) 1px,transparent 1px);
  background-size:40px 40px; animation:gm 10s linear infinite; z-index:0; pointer-events:none;
}
@keyframes gm{to{background-position:40px 40px;}}

.orb{position:fixed;border-radius:50%;filter:blur(100px);z-index:0;pointer-events:none;}
.orb1{width:500px;height:500px;background:rgba(201,162,39,0.09);top:-200px;left:-150px;animation:op 8s ease-in-out infinite;}
.orb2{width:400px;height:400px;background:rgba(232,197,71,0.06);bottom:-150px;right:-100px;animation:op 8s ease-in-out infinite reverse;}
@keyframes op{0%,100%{transform:scale(1);}50%{transform:scale(1.2);}}

/* Particles */
.ptcl{position:fixed;border-radius:50%;pointer-events:none;z-index:1;box-shadow:0 0 6px var(--gold2);animation:fly linear infinite;}
@keyframes fly{0%{transform:translateY(110vh);opacity:0;}5%{opacity:1;}90%{opacity:0.7;}100%{transform:translateY(-20px);opacity:0;}}

/* ===== MAIN CARD ===== */
.ad-card{
  position:relative; z-index:10;
  background:linear-gradient(135deg,rgba(10,22,40,0.97),rgba(13,27,46,0.97));
  border:1px solid rgba(201,162,39,0.25);
  border-radius:24px; padding:36px 30px 32px;
  max-width:400px; width:92vw;
  text-align:center;
  box-shadow:0 0 0 1px rgba(201,162,39,0.08), 0 30px 80px rgba(0,0,0,0.8), 0 0 60px rgba(201,162,39,0.1);
  backdrop-filter:blur(16px);
  animation:scaleIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes scaleIn{from{opacity:0;transform:scale(0.85);}to{opacity:1;transform:scale(1);}}

/* Gold top strip */
.card-strip{
  position:absolute; top:0; left:0; right:0; height:4px;
  background:linear-gradient(90deg,#7a5c00,var(--gold),var(--gold2),var(--gold3),var(--gold2),var(--gold),#7a5c00);
  background-size:200% auto; animation:shine 2.5s linear infinite; border-radius:24px 24px 0 0;
}
@keyframes shine{to{background-position:200% center;}}

/* Logo */
.brand{
  font-family:'Orbitron',monospace; font-size:22px; font-weight:900;
  background:linear-gradient(90deg,var(--gold),var(--gold2),var(--gold3));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 10px rgba(201,162,39,0.5));
  letter-spacing:3px; margin-bottom:6px;
}
.brand-sub{font-size:10px;color:rgba(201,162,39,0.45);letter-spacing:4px;text-transform:uppercase;margin-bottom:28px;}

/* ===== CIRCULAR TIMER ===== */
.timer-wrap{position:relative;width:160px;height:160px;margin:0 auto 28px;}

.timer-svg{width:160px;height:160px;transform:rotate(-90deg);}
.timer-track{fill:none;stroke:rgba(201,162,39,0.1);stroke-width:8;}
.timer-arc{
  fill:none; stroke-width:8; stroke-linecap:round;
  stroke:url(#arcGrad);
  stroke-dasharray:440; stroke-dashoffset:0;
  transition:stroke-dashoffset 1s linear;
}

.timer-inner{
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
}
.timer-num{
  font-family:'Orbitron',monospace; font-size:48px; font-weight:900; line-height:1;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  text-shadow:none; filter:drop-shadow(0 0 12px rgba(201,162,39,0.5));
}
.timer-lbl{font-size:10px;color:rgba(201,162,39,0.5);letter-spacing:3px;text-transform:uppercase;margin-top:4px;}

/* Pulse ring */
.pulse-ring{
  position:absolute; inset:-8px; border-radius:50%;
  border:2px solid rgba(201,162,39,0.15);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{transform:scale(1);opacity:0.5;}50%{transform:scale(1.08);opacity:1;}}

/* Message */
.ad-message{
  font-size:17px; color:rgba(255,255,255,0.8); line-height:1.6; margin-bottom:18px;
}
.ad-message strong{color:var(--gold2);}
.ad-message .rs-badge{
  display:inline-block;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:var(--navy); font-family:'Orbitron',monospace;
  font-size:14px; font-weight:700; padding:4px 16px; border-radius:20px;
  letter-spacing:1px; margin:6px 4px;
  box-shadow:0 0 20px rgba(201,162,39,0.4);
}

/* Progress bar */
.prog-wrap{background:rgba(201,162,39,0.08);border-radius:30px;height:6px;overflow:hidden;margin-bottom:20px;}
.prog-bar{
  height:100%; border-radius:30px;
  background:linear-gradient(90deg,var(--gold),var(--gold2));
  width:100%; transition:width 1s linear;
  box-shadow:0 0 10px rgba(201,162,39,0.5);
}

/* Status text */
.status-txt{font-size:13px;color:rgba(255,255,255,0.4);letter-spacing:2px;margin-bottom:24px;}

/* Info pills */
.info-pills{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:24px;}
.ipill{
  background:rgba(201,162,39,0.06);border:1px solid rgba(201,162,39,0.15);
  border-radius:20px;padding:6px 14px;
  font-size:11px;color:rgba(255,255,255,0.55);letter-spacing:1px;
}
.ipill span{color:var(--gold2);font-weight:700;}

/* Skip button (disabled until 30s) */
.skip-btn{
  display:inline-block; padding:14px 40px;
  font-family:'Orbitron',monospace; font-size:13px; font-weight:700; letter-spacing:2px;
  border-radius:50px; border:none; cursor:pointer;
  transition:all 0.3s ease;
}
.skip-btn.disabled{
  background:rgba(201,162,39,0.08);
  border:1px solid rgba(201,162,39,0.15);
  color:rgba(201,162,39,0.35); cursor:not-allowed;
}
.skip-btn.ready{
  background:linear-gradient(135deg,var(--gold),var(--gold2),var(--gold3),var(--gold2),var(--gold));
  background-size:200% auto;
  color:var(--navy);
  box-shadow:0 0 30px rgba(201,162,39,0.5),0 8px 24px rgba(0,0,0,0.4);
  animation:shine 2s linear infinite, btnPulse 2s ease-in-out infinite;
}
@keyframes btnPulse{0%,100%{box-shadow:0 0 30px rgba(201,162,39,0.5),0 8px 24px rgba(0,0,0,0.4);}50%{box-shadow:0 0 50px rgba(201,162,39,0.8),0 8px 24px rgba(0,0,0,0.4);}}
.skip-btn.ready:hover{transform:scale(1.06) translateY(-2px);}

/* Click recorded toast */
.rec-toast{
  position:fixed;top:24px;left:50%;transform:translateX(-50%);
  background:linear-gradient(135deg,rgba(10,22,40,0.95),rgba(13,27,46,0.95));
  border:1px solid rgba(201,162,39,0.3);
  color:rgba(255,255,255,0.85);
  padding:10px 24px;border-radius:30px;
  font-size:13px;letter-spacing:1px;
  opacity:0;transition:opacity 0.4s;pointer-events:none;z-index:999;
}
.rec-toast .dot{
  display:inline-block;width:8px;height:8px;border-radius:50%;
  background:var(--gold2);margin-right:8px;
  box-shadow:0 0 8px var(--gold2);
  animation:blink 1s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}
.rec-toast.show{opacity:1;}
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<!-- Toast -->
<div class="rec-toast" id="recToast">
  <span class="dot"></span> Click Recorded Successfully!
</div>

<!-- MAIN AD CARD -->
<div class="ad-card">
  <div class="card-strip"></div>

  <div class="brand">VEXORA</div>
  <div class="brand-sub">Pro · Earn Online</div>

  <!-- Circular Timer -->
  <div class="timer-wrap">
    <div class="pulse-ring"></div>
    <svg class="timer-svg" viewBox="0 0 160 160">
      <defs>
        <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="#c9a227"/>
          <stop offset="50%"  stop-color="#e8c547"/>
          <stop offset="100%" stop-color="#fff5b0"/>
        </linearGradient>
      </defs>
      <circle class="timer-track" cx="80" cy="80" r="70"/>
      <circle class="timer-arc"   cx="80" cy="80" r="70" id="timerArc"/>
    </svg>
    <div class="timer-inner">
      <div class="timer-num" id="timerNum">30</div>
      <div class="timer-lbl">seconds</div>
    </div>
  </div>

  <!-- Message -->
  <div class="ad-message">
    🎉 Mubarak ho! Aapka Click<br>
    <strong>Verify ho raha hai…</strong><br><br>
    <span class="rs-badge">Rs 50 / 1000 Clicks</span><br>
    Apna link share karo aur ghar baith kar kamao!
  </div>

  <!-- Progress bar -->
  <div class="prog-wrap">
    <div class="prog-bar" id="progBar"></div>
  </div>

  <!-- Status -->
  <div class="status-txt" id="statusTxt">⏳ Please wait, ad loading…</div>

  <!-- Info pills -->
  <div class="info-pills">
    <div class="ipill">Referral: <span id="refDisplay">—</span></div>
    <div class="ipill">Status: <span id="statusPill" style="color:var(--gold2);">Verifying</span></div>
  </div>

  <!-- Skip / Continue button -->
  <button class="skip-btn disabled" id="skipBtn" disabled>
    ⏳ &nbsp;Please Wait (<span id="btnCount">30</span>s)
  </button>
</div>

<!-- ============ SCRIPT ============ -->
<script>
// ============ CONFIG — FILL THESE ============
const GAS_URL       = 'YOUR_GAS_DEPLOYMENT_URL';     // ← GAS URL yahan
const REFERRAL_URL  = 'https://pk.win03.club/login?mode=register&i=VvtOD6eK';
const TOTAL_SECONDS = 30;
// ============================================

// Get ref from URL
const params  = new URLSearchParams(window.location.search);
const refId   = params.get('ref') || 'GUEST';
document.getElementById('refDisplay').textContent = refId;

// Circumference for r=70
const CIRCUM = 2 * Math.PI * 70; // ≈ 439.8
const arc = document.getElementById('timerArc');
arc.style.strokeDasharray  = CIRCUM;
arc.style.strokeDashoffset = 0;

let timeLeft = TOTAL_SECONDS;

// Record click immediately (non-blocking)
recordClick();

// Start countdown
const interval = setInterval(() => {
  timeLeft--;
  const pct = timeLeft / TOTAL_SECONDS;

  // Update number
  document.getElementById('timerNum').textContent = timeLeft;

  // Update arc (fills from full → empty = timer counts down)
  arc.style.strokeDashoffset = CIRCUM * (1 - pct);

  // Update progress bar (fills up)
  document.getElementById('progBar').style.width = ((1 - pct) * 100) + '%';

  // Update button count
  document.getElementById('btnCount').textContent = timeLeft;

  // Update status
  if(timeLeft <= 20 && timeLeft > 10){
    document.getElementById('statusTxt').textContent = '⚡ Almost there… hang on!';
  } else if(timeLeft <= 10 && timeLeft > 0){
    document.getElementById('statusTxt').textContent = '🔥 Almost done! ' + timeLeft + 's remaining';
  }

  if(timeLeft <= 0){
    clearInterval(interval);
    unlockButton();
  }
}, 1000);

function unlockButton(){
  const btn = document.getElementById('skipBtn');
  btn.classList.remove('disabled');
  btn.classList.add('ready');
  btn.disabled = false;
  btn.innerHTML = '🚀 &nbsp;Proceed to Join Now!';
  btn.onclick = () => { window.location.href = REFERRAL_URL; };
  document.getElementById('statusTxt').textContent = '✅ Verified! Click to continue';
  document.getElementById('statusPill').textContent = 'Verified ✓';
  document.getElementById('statusPill').style.color = '#4ade80';

  // Auto-redirect after 5s
  setTimeout(() => { window.location.href = REFERRAL_URL; }, 5000);
}

// ===== RECORD CLICK via GAS =====
async function recordClick(){
  try {
    // Get IP
    let ip = 'unknown';
    let vpn = false;
    try {
      const ipRes = await fetch('https://api.ipapi.is/?q&fields=ip,vpn,proxy', { signal: AbortSignal.timeout(5000) });
      const ipData = await ipRes.json();
      ip  = ipData.ip  || 'unknown';
      vpn = ipData.vpn || ipData.proxy || false;
    } catch(e){ ip = 'unknown'; }

    if(vpn){
      document.getElementById('statusPill').textContent = 'VPN Blocked';
      document.getElementById('statusPill').style.color = '#f87171';
      return;
    }

    // Send to GAS
    const url = GAS_URL
      + '?action=click'
      + '&ref='    + encodeURIComponent(refId)
      + '&ip='     + encodeURIComponent(ip)
      + '&ua='     + encodeURIComponent(navigator.userAgent.substring(0, 200))
      + '&ts='     + Date.now();

    const res  = await fetch(url);
    const data = await res.json();

    // Show toast
    if(data.status === 'accepted' || data.status === 'rewarded'){
      showToast();
      if(data.status === 'rewarded'){
        document.getElementById('adMessage') && (document.getElementById('adMessage').innerHTML +=
          '<br><br>🎉 <strong style="color:#4ade80;">Rs 50 Aapki Balance mein Add!</strong>');
      }
    }

    console.log('Click result:', data);
  } catch(e){ console.warn('GAS call failed:', e); }
}

function showToast(){
  const t = document.getElementById('recToast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>

<!-- Particles -->
<script>
for(let i=0;i<14;i++){
  const p=document.createElement('div');
  p.className='ptcl';
  const s=1+Math.random()*2.5;
  p.style.cssText=`width:${s}px;height:${s}px;background:#e8c547;left:${Math.random()*100}vw;animation-duration:${8+Math.random()*10}s;animation-delay:${-Math.random()*14}s;opacity:${0.3+Math.random()*0.5};`;
  document.body.appendChild(p);
}
</script>
</body>
</html>
