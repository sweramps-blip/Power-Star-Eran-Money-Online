<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Loading Reward… – Vexora Pro</title>

<!-- OG tags so this page also shows card preview on Facebook -->
<meta property="og:title"       content="🤑 Free Earn Money – No Investment | Vexora Pro"/>
<meta property="og:description" content="Earn Rs 50 for every 1000 real clicks. 100% Free. Withdraw via EasyPaisa & JazzCash."/>
<meta property="og:image"       content="https://vexorainternational.online/og-card.jpg"/>
<meta property="og:url"         content="https://vexorainternational.online/click.html"/>
<meta property="og:type"        content="website"/>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--g1:#c9a227;--g2:#e8c547;--g3:#fff5b0;--n1:#050a12;--n2:#0a1628;--n3:#0d1b2e;}

html,body{
  height:100%;background:var(--n1);
  font-family:'Rajdhani',sans-serif;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;position:relative;
}

body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(201,162,39,.055) 1px,transparent 1px),linear-gradient(90deg,rgba(201,162,39,.055) 1px,transparent 1px);
  background-size:40px 40px;animation:gm 10s linear infinite;
}
@keyframes gm{to{background-position:40px 40px;}}
.orb{position:fixed;border-radius:50%;filter:blur(100px);z-index:0;pointer-events:none;}
.o1{width:500px;height:500px;background:rgba(201,162,39,.09);top:-200px;left:-150px;animation:op 8s ease-in-out infinite;}
.o2{width:400px;height:400px;background:rgba(232,197,71,.06);bottom:-150px;right:-100px;animation:op 8s ease-in-out infinite reverse;}
@keyframes op{0%,100%{transform:scale(1);}50%{transform:scale(1.2);}}
.ptcl{position:fixed;border-radius:50%;pointer-events:none;z-index:1;box-shadow:0 0 6px var(--g2);animation:fly linear infinite;}
@keyframes fly{0%{transform:translateY(110vh);opacity:0;}5%{opacity:1;}90%{opacity:.7;}100%{transform:translateY(-20px);opacity:0;}}

/* MAIN AD CARD */
.ad-card{
  position:relative;z-index:10;
  background:linear-gradient(135deg,rgba(10,22,40,.97),rgba(13,27,46,.97));
  border:1px solid rgba(201,162,39,.25);border-radius:24px;
  padding:32px 28px 28px;max-width:380px;width:92vw;text-align:center;
  box-shadow:0 0 0 1px rgba(201,162,39,.07),0 30px 80px rgba(0,0,0,.8),0 0 60px rgba(201,162,39,.1);
  backdrop-filter:blur(16px);animation:si .5s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes si{from{opacity:0;transform:scale(.85);}to{opacity:1;transform:scale(1);}}

.c-strip{
  position:absolute;top:0;left:0;right:0;height:4px;z-index:2;
  background:linear-gradient(90deg,#7a5c00,var(--g1),var(--g2),var(--g3),var(--g2),var(--g1),#7a5c00);
  background-size:200% auto;animation:sh 2.5s linear infinite;border-radius:24px 24px 0 0;
}
@keyframes sh{to{background-position:200% center;}}

.brand{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;background:linear-gradient(90deg,var(--g1),var(--g2),var(--g3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 10px rgba(201,162,39,.5));letter-spacing:3px;margin-bottom:4px;}
.brand-sub{font-size:10px;color:rgba(201,162,39,.45);letter-spacing:4px;text-transform:uppercase;margin-bottom:26px;}

/* CIRCULAR TIMER */
.tmr-wrap{position:relative;width:160px;height:160px;margin:0 auto 24px;}
.pulse-r{position:absolute;inset:-8px;border-radius:50%;border:2px solid rgba(201,162,39,.15);animation:pr 2s ease-in-out infinite;}
@keyframes pr{0%,100%{transform:scale(1);opacity:.5;}50%{transform:scale(1.08);opacity:1;}}
.tmr-svg{width:160px;height:160px;transform:rotate(-90deg);}
.trk{fill:none;stroke:rgba(201,162,39,.1);stroke-width:8;}
.arc{fill:none;stroke-width:8;stroke-linecap:round;stroke:url(#ag);stroke-dasharray:440;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear;}
.tmr-in{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.tmr-n{font-family:'Orbitron',monospace;font-size:48px;font-weight:900;line-height:1;background:linear-gradient(135deg,var(--g1),var(--g2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 12px rgba(201,162,39,.5));}
.tmr-l{font-size:10px;color:rgba(201,162,39,.5);letter-spacing:3px;text-transform:uppercase;margin-top:4px;}

/* MESSAGE */
.ad-msg{font-size:16px;color:rgba(255,255,255,.8);line-height:1.65;margin-bottom:16px;}
.ad-msg strong{color:var(--g2);}
.rs-tag{display:inline-block;background:linear-gradient(135deg,var(--g1),var(--g2));color:var(--n1);font-family:'Orbitron',monospace;font-size:13px;font-weight:700;padding:4px 16px;border-radius:20px;letter-spacing:1px;margin:6px 4px;box-shadow:0 0 20px rgba(201,162,39,.4);}

/* PROGRESS BAR */
.prog{background:rgba(201,162,39,.08);border-radius:30px;height:6px;overflow:hidden;margin-bottom:18px;}
.prog-b{height:100%;border-radius:30px;background:linear-gradient(90deg,var(--g1),var(--g2));width:0%;transition:width 1s linear;box-shadow:0 0 10px rgba(201,162,39,.5);}

/* STATUS */
.stat-t{font-size:12px;color:rgba(255,255,255,.38);letter-spacing:2px;margin-bottom:20px;}

/* INFO PILLS */
.ipills{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;}
.ip{background:rgba(201,162,39,.06);border:1px solid rgba(201,162,39,.15);border-radius:20px;padding:6px 14px;font-size:11px;color:rgba(255,255,255,.5);letter-spacing:1px;}
.ip span{color:var(--g2);font-weight:700;}

/* MAIN BUTTON */
.main-btn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:15px;border:none;border-radius:50px;cursor:pointer;
  font-family:'Orbitron',monospace;font-size:13px;font-weight:700;letter-spacing:2px;
  transition:all .3s;
}
.main-btn.wait{
  background:rgba(201,162,39,.08);border:1px solid rgba(201,162,39,.15);
  color:rgba(201,162,39,.35);cursor:not-allowed;
}
.main-btn.go{
  background:linear-gradient(135deg,var(--g1),var(--g2),var(--g3),var(--g2),var(--g1));
  background-size:200% auto;color:var(--n1);
  box-shadow:0 0 30px rgba(201,162,39,.5),0 8px 24px rgba(0,0,0,.4);
  animation:sh 2s linear infinite, bp 2s ease-in-out infinite;
}
@keyframes bp{0%,100%{box-shadow:0 0 30px rgba(201,162,39,.5),0 8px 24px rgba(0,0,0,.4);}50%{box-shadow:0 0 50px rgba(201,162,39,.8),0 8px 24px rgba(0,0,0,.4);}}
.main-btn.go:hover{transform:scale(1.05) translateY(-2px);}
.main-btn.go:active{transform:scale(.97);}
.btn-icon{font-size:18px;}

/* CLICK RECORDED TOAST */
.rec-toast{
  position:fixed;top:22px;left:50%;transform:translateX(-50%);
  background:rgba(10,22,40,.96);border:1px solid rgba(201,162,39,.3);
  color:rgba(255,255,255,.85);padding:10px 22px;border-radius:30px;
  font-size:13px;letter-spacing:1px;
  opacity:0;transition:opacity .4s;pointer-events:none;z-index:999;
  display:flex;align-items:center;gap:8px;white-space:nowrap;
}
.dot{width:8px;height:8px;border-radius:50%;background:var(--g2);box-shadow:0 0 8px var(--g2);animation:blink 1s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
.rec-toast.on{opacity:1;}

/* AUTO-REDIRECT NOTICE */
.auto-note{font-size:11px;color:rgba(255,255,255,.25);letter-spacing:1px;margin-top:14px;}
.auto-note span{color:rgba(201,162,39,.5);}
</style>
</head>
<body>

<div class="orb o1"></div>
<div class="orb o2"></div>

<!-- Click recorded toast -->
<div class="rec-toast" id="recToast">
  <div class="dot"></div> Click Recorded Successfully!
</div>

<!-- MAIN AD CARD -->
<div class="ad-card">
  <div class="c-strip"></div>

  <div class="brand">VEXORA</div>
  <div class="brand-sub">Pro · Earn Online</div>

  <!-- Circular Timer -->
  <div class="tmr-wrap">
    <div class="pulse-r"></div>
    <svg class="tmr-svg" viewBox="0 0 160 160">
      <defs>
        <linearGradient id="ag" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="#c9a227"/>
          <stop offset="50%"  stop-color="#e8c547"/>
          <stop offset="100%" stop-color="#fff5b0"/>
        </linearGradient>
      </defs>
      <circle class="trk" cx="80" cy="80" r="70"/>
      <circle class="arc"  cx="80" cy="80" r="70" id="arcEl"/>
    </svg>
    <div class="tmr-in">
      <div class="tmr-n" id="tmrNum">30</div>
      <div class="tmr-l">seconds</div>
    </div>
  </div>

  <!-- Message -->
  <div class="ad-msg">
    🎉 Congratulations! Your click is<br>
    <strong>being verified…</strong><br><br>
    <span class="rs-tag">Rs 50 / 1000 Clicks</span><br>
    Share your link and earn from home!
  </div>

  <!-- Progress bar -->
  <div class="prog"><div class="prog-b" id="progBar"></div></div>

  <!-- Status -->
  <div class="stat-t" id="statTxt">⏳ Please wait while the ad loads…</div>

  <!-- Info pills -->
  <div class="ipills">
    <div class="ip">Ref: <span id="refShow">—</span></div>
    <div class="ip">Status: <span id="statPill">Verifying…</span></div>
  </div>

  <!-- Main button — locked until 30s -->
  <button class="main-btn wait" id="mainBtn" disabled>
    <span class="btn-icon">⏳</span>
    <span id="btnTxt">Please Wait (30s)</span>
  </button>

  <!-- Auto-redirect notice (shown after unlock) -->
  <div class="auto-note" id="autoNote" style="display:none;">
    Auto-redirecting in <span id="autoCount">5</span>s…
  </div>
</div>

<!-- SCRIPT -->
<script>
// ── CONFIG ─────────────────────────────────────────────
const GAS_URL      = 'YOUR_GAS_DEPLOYMENT_URL';  // ← Paste your GAS URL here
const REDIRECT_URL = 'https://pk.win03.club/login?mode=register&i=VvtOD6eK';
const TOTAL_SECS   = 30;
// ───────────────────────────────────────────────────────

const params  = new URLSearchParams(window.location.search);
const refId   = params.get('ref') || 'GUEST';

document.getElementById('refShow').textContent = refId;

// Arc circumference for r=70
const CIRCUM = 2 * Math.PI * 70; // ≈ 439.82
const arcEl  = document.getElementById('arcEl');
arcEl.style.strokeDasharray  = CIRCUM;
arcEl.style.strokeDashoffset = 0; // starts full (we drain it)

let timeLeft = TOTAL_SECS;
let autoTimer = null;

// Record click immediately (non-blocking)
recordClick();

// ── COUNTDOWN ──
const interval = setInterval(() => {
  timeLeft--;
  const pct = timeLeft / TOTAL_SECS;

  // Update number
  document.getElementById('tmrNum').textContent = timeLeft;

  // Drain the arc (offset increases → arc shrinks)
  arcEl.style.strokeDashoffset = CIRCUM * (1 - pct);

  // Fill progress bar
  document.getElementById('progBar').style.width = ((1 - pct) * 100) + '%';

  // Update status text
  if (timeLeft <= 20 && timeLeft > 10) {
    document.getElementById('statTxt').textContent = '⚡ Almost there — hang on!';
  } else if (timeLeft <= 10 && timeLeft > 0) {
    document.getElementById('statTxt').textContent = '🔥 ' + timeLeft + ' seconds remaining…';
  }

  // Update button countdown
  document.getElementById('btnTxt').textContent = 'Please Wait (' + timeLeft + 's)';

  if (timeLeft <= 0) {
    clearInterval(interval);
    unlockAndRedirect();
  }
}, 1000);

// ── UNLOCK BUTTON & START AUTO-REDIRECT ──
function unlockAndRedirect() {
  const btn = document.getElementById('mainBtn');
  btn.classList.remove('wait');
  btn.classList.add('go');
  btn.disabled = false;
  btn.querySelector('.btn-icon').textContent = '🚀';
  document.getElementById('btnTxt').textContent = 'Join Vexora Pro Now!';
  btn.onclick = () => { clearTimeout(autoTimer); goToAd(); };

  document.getElementById('statTxt').textContent  = '✅ Verified! Redirecting you now…';
  document.getElementById('statPill').textContent = 'Verified ✓';
  document.getElementById('statPill').style.color = '#4ade80';

  // Show auto-redirect note
  document.getElementById('autoNote').style.display = 'block';
  let countdown = 5;
  const autoInterval = setInterval(() => {
    countdown--;
    document.getElementById('autoCount').textContent = countdown;
    if (countdown <= 0) {
      clearInterval(autoInterval);
      goToAd();
    }
  }, 1000);
}

// ── ACTUAL REDIRECT TO MONTAGE AD / REFERRAL ──
function goToAd() {
  window.location.href = REDIRECT_URL;
}

// ── RECORD CLICK VIA GAS ──
async function recordClick() {
  try {
    // Get IP + VPN check
    let ip = 'unknown', isVPN = false;
    try {
      const r    = await fetch('https://api.ipapi.is/?q&fields=ip,vpn,proxy', { signal: AbortSignal.timeout(5000) });
      const data = await r.json();
      ip    = data.ip    || 'unknown';
      isVPN = data.vpn   || data.proxy || false;
    } catch(e) { /* continue without IP */ }

    if (isVPN) {
      document.getElementById('statPill').textContent = 'VPN Blocked ✗';
      document.getElementById('statPill').style.color = '#f87171';
      return;
    }

    // Send to GAS backend
    if (GAS_URL && GAS_URL !== 'YOUR_GAS_DEPLOYMENT_URL') {
      const url = GAS_URL
        + '?action=click'
        + '&ref='  + encodeURIComponent(refId)
        + '&ip='   + encodeURIComponent(ip)
        + '&ua='   + encodeURIComponent(navigator.userAgent.substring(0, 200))
        + '&ts='   + Date.now();

      const res  = await fetch(url);
      const data = await res.json();

      if (data.status === 'accepted' || data.status === 'rewarded') {
        showRecToast();
        if (data.status === 'rewarded') {
          document.getElementById('statPill').textContent = 'Rs 50 Added! 🎉';
          document.getElementById('statPill').style.color = '#4ade80';
        }
      } else {
        document.getElementById('statPill').textContent = data.reason || 'Rejected';
        document.getElementById('statPill').style.color = '#fbbf24';
      }
    } else {
      // GAS not configured yet — just show toast
      showRecToast();
    }
  } catch(e) {
    console.warn('GAS call error:', e);
    showRecToast(); // still show toast so UI looks live
  }
}

function showRecToast() {
  const t = document.getElementById('recToast');
  t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), 3500);
}
</script>

<!-- Particles -->
<script>
for (let i=0;i<14;i++){
  const p=document.createElement('div');
  p.className='ptcl';
  const s=1+Math.random()*2.5;
  p.style.cssText=`width:${s}px;height:${s}px;background:#e8c547;left:${Math.random()*100}vw;animation-duration:${8+Math.random()*10}s;animation-delay:${-Math.random()*14}s;opacity:${.3+Math.random()*.5};`;
  document.body.appendChild(p);
}
</script>
</body>
</html>
