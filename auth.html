<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Power Star | Login & Register</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Outfit',sans-serif;background:#0a0e1a;color:#fff;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
body::before{content:'';position:fixed;top:-40%;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(251,191,36,0.12) 0%,transparent 70%);pointer-events:none;z-index:0;}
.page{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 16px;position:relative;z-index:1;}
.logo-wrap{text-align:center;margin-bottom:28px;}
.logo-icon{width:68px;height:68px;background:linear-gradient(135deg,#fbbf24,#f59e0b);border-radius:20px;display:inline-flex;align-items:center;justify-content:center;font-size:30px;color:#0a0e1a;box-shadow:0 8px 28px rgba(251,191,36,0.4);margin-bottom:14px;}
.logo-wrap h1{font-size:26px;font-weight:800;color:#fff;letter-spacing:1.5px;text-transform:uppercase;}
.logo-wrap p{font-size:12px;color:#64748b;margin-top:4px;letter-spacing:0.5px;}
.card{width:100%;max-width:390px;background:#131829;border:1px solid #1e2a45;border-radius:24px;padding:28px 22px 24px;box-shadow:0 16px 52px rgba(0,0,0,0.4);}
.tab-bar{display:flex;background:#0a0e1a;border-radius:14px;padding:4px;margin-bottom:26px;gap:4px;}
.tab-btn{flex:1;padding:11px 0;border:none;background:transparent;color:#64748b;font-size:14px;font-weight:700;border-radius:11px;cursor:pointer;transition:.25s;font-family:'Outfit',sans-serif;}
.tab-btn.active{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#0a0e1a;box-shadow:0 3px 12px rgba(251,191,36,0.3);}
.form-panel{display:none;animation:fadeUp .3s ease;}
.form-panel.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.field{position:relative;margin-bottom:15px;}
.field label{display:block;font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:7px;}
.input-wrap input,.input-wrap select{width:100%;padding:13px 14px 13px 42px;background:#0f1423;border:1.5px solid #1e2a45;border-radius:13px;color:#fff;font-family:'Outfit',sans-serif;font-size:14px;outline:none;transition:.25s;appearance:none;}
.input-wrap input:focus,.input-wrap select:focus{border-color:#fbbf24;box-shadow:0 0 0 3px rgba(251,191,36,0.15);}
.input-wrap select option{background:#0f1423;}
.input-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#3d4f6e;font-size:14px;pointer-events:none;}
.eye-toggle{position:absolute;right:13px;top:50%;transform:translateY(-50%);color:#3d4f6e;font-size:14px;cursor:pointer;background:none;border:none;z-index:2;}
.phone-prefix{position:absolute;left:38px;top:50%;transform:translateY(-50%);font-size:13px;font-weight:700;color:#fbbf24;pointer-events:none;}
.input-wrap.phone input{padding-left:80px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.strength-track{display:flex;gap:5px;margin-top:8px;height:3px;}
.strength-seg{flex:1;border-radius:3px;background:#1e2a45;transition:.3s;}
.s-weak{background:#ef4444!important;}
.s-medium{background:#f97316!important;}
.s-strong{background:#22c55e!important;}
.strength-label{font-size:11px;margin-top:5px;font-weight:600;min-height:16px;}
.terms-row{display:flex;align-items:flex-start;gap:10px;margin:18px 0;cursor:pointer;}
.terms-row input{accent-color:#fbbf24;width:16px;height:16px;margin-top:2px;flex-shrink:0;}
.terms-row span{font-size:12px;color:#64748b;line-height:1.5;}
.submit-btn{width:100%;padding:14px;background:linear-gradient(135deg,#fbbf24,#f59e0b);border:none;border-radius:13px;color:#0a0e1a;font-size:15px;font-weight:800;cursor:pointer;transition:.25s;box-shadow:0 4px 18px rgba(251,191,36,0.32);font-family:'Outfit',sans-serif;}
.submit-btn:active{transform:scale(0.97);}
.device-row{margin-top:20px;text-align:center;font-size:11px;color:#3d4f6e;display:flex;align-items:center;justify-content:center;gap:6px;}
.did-value{color:#64748b;font-weight:600;}
</style>
</head>
<body>
<div class="page">
  <div class="logo-wrap">
    <div class="logo-icon"><i class="fas fa-bolt"></i></div>
    <h1>Power Star</h1>
    <p>Secure Authentication</p>
  </div>

  <div class="card">
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-login"    onclick="switchTab('login')">🔑 Login</button>
      <button class="tab-btn"        id="tab-register" onclick="switchTab('register')">✨ Register</button>
    </div>

    <!-- LOGIN -->
    <div class="form-panel active" id="panel-login">
      <div class="field">
        <label>Phone Number</label>
        <div class="input-wrap phone">
          <i class="fas fa-phone input-icon"></i>
          <span class="phone-prefix">+92</span>
          <input type="tel" id="l-num" placeholder="3001234567" inputmode="numeric">
        </div>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="input-wrap" style="position:relative;">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" id="l-pass" placeholder="Enter password">
          <button class="eye-toggle" onclick="toggleEye('l-pass',this)" type="button"><i class="fas fa-eye"></i></button>
        </div>
      </div>
      <button class="submit-btn" onclick="doLogin()"><i class="fas fa-right-to-bracket"></i> Login</button>
    </div>

    <!-- REGISTER -->
    <div class="form-panel" id="panel-register">
      <div class="field">
        <label>Full Name</label>
        <div class="input-wrap">
          <i class="fas fa-user input-icon"></i>
          <input type="text" id="r-name" placeholder="Apna pura naam likhein">
        </div>
      </div>
      <div class="field">
        <label>Phone Number</label>
        <div class="input-wrap phone">
          <i class="fas fa-phone input-icon"></i>
          <span class="phone-prefix">+92</span>
          <input type="tel" id="r-num" placeholder="3001234567" inputmode="numeric">
        </div>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="input-wrap" style="position:relative;">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" id="r-pass" placeholder="Password banayein" oninput="checkStrength()">
          <button class="eye-toggle" onclick="toggleEye('r-pass',this)" type="button"><i class="fas fa-eye"></i></button>
        </div>
        <div class="strength-track">
          <div class="strength-seg" id="seg1"></div>
          <div class="strength-seg" id="seg2"></div>
          <div class="strength-seg" id="seg3"></div>
        </div>
        <div class="strength-label" id="strength-label"></div>
      </div>
      <div class="field">
        <label>Referral Code <span style="color:#3d4f6e;font-weight:400;">(Optional)</span></label>
        <div class="input-wrap">
          <i class="fas fa-tag input-icon"></i>
          <input type="text" id="r-ref" placeholder="PS0001" oninput="this.value=this.value.toUpperCase()">
        </div>
      </div>
      <label class="terms-row">
        <input type="checkbox" id="terms-chk">
        <span>I agree to the <b style="color:#fbbf24;">Terms & Conditions</b> of Power Star</span>
      </label>
      <button class="submit-btn" onclick="doRegister()"><i class="fas fa-user-plus"></i> Create Account</button>
    </div>

    <div class="device-row">
      <i class="fas fa-mobile-screen-button"></i>
      Device: <span class="did-value" id="did-text">loading...</span>
    </div>
  </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbxSF7kNSn0aJkuuDVVMVchE_5lPrKVCRW2jem9YoV1lrBt9QZuQZeXiReM6OgBwBgQB/exec";

// ─── INIT ───────────────────────────────────────────────
window.onload = function() {
  // Already logged in? Go to dashboard
  if (localStorage.getItem("psLoggedIn") === "true" && localStorage.getItem("psID")) {
    window.location.replace("dashboard.html"); return;
  }

  const did = getDeviceId();
  document.getElementById("did-text").innerText = did.substring(0,10) + "...";

  // Auto-fill referral from URL ?ref=PS0001
  const ref = new URLSearchParams(window.location.search).get("ref");
  if (ref) {
    document.getElementById("r-ref").value = ref.toUpperCase();
    switchTab("register");
  }
};

// ─── DEVICE ID ──────────────────────────────────────────
function getDeviceId() {
  let id = localStorage.getItem("ps_device_token");
  if (!id) {
    id = "dev-" + Math.random().toString(36).substr(2,9) + "-" + Date.now();
    localStorage.setItem("ps_device_token", id);
  }
  return id;
}

// ─── TAB SWITCH ─────────────────────────────────────────
function switchTab(type) {
  document.querySelectorAll(".tab-btn").forEach(function(b){ b.classList.remove("active"); });
  document.querySelectorAll(".form-panel").forEach(function(p){ p.classList.remove("active"); });
  document.getElementById("tab-"   + type).classList.add("active");
  document.getElementById("panel-" + type).classList.add("active");
}

// ─── PASSWORD EYE ───────────────────────────────────────
function toggleEye(id, btn) {
  const inp  = document.getElementById(id);
  const icon = btn.querySelector("i");
  if (inp.type === "password") { inp.type = "text";     icon.className = "fas fa-eye-slash"; }
  else                         { inp.type = "password"; icon.className = "fas fa-eye"; }
}

// ─── STRENGTH BAR ───────────────────────────────────────
function checkStrength() {
  const val  = document.getElementById("r-pass").value;
  const segs = ["seg1","seg2","seg3"].map(function(id){ return document.getElementById(id); });
  const lbl  = document.getElementById("strength-label");
  segs.forEach(function(s){ s.className = "strength-seg"; });
  if (!val.length) { lbl.textContent = ""; return; }
  if (val.length < 5) {
    segs[0].classList.add("s-weak");
    lbl.textContent = "Weak"; lbl.style.color = "#ef4444";
  } else if (val.length < 8) {
    segs[0].classList.add("s-medium"); segs[1].classList.add("s-medium");
    lbl.textContent = "Medium"; lbl.style.color = "#f97316";
  } else {
    segs.forEach(function(s){ s.classList.add("s-strong"); });
    lbl.textContent = "Strong"; lbl.style.color = "#22c55e";
  }
}

// ─── SAVE SESSION (sab keys ek jagah) ───────────────────
function saveSession(user) {
  const u = JSON.stringify(user);
  localStorage.setItem("psLoggedIn", "true");
  localStorage.setItem("psID",       user.user_id);
  localStorage.setItem("psUser",     u);
  localStorage.setItem("ps_user",    u);
}

// ─── LOGIN ──────────────────────────────────────────────
async function doLogin() {
  const num      = document.getElementById("l-num").value.trim();
  const pass     = document.getElementById("l-pass").value.trim();
  const deviceId = getDeviceId();

  if (!num || !pass)
    return Swal.fire({ title:"Error", text:"Phone aur Password zarori hai", icon:"error" });

  Swal.fire({ title:"Verifying...", allowOutsideClick:false, didOpen:function(){ Swal.showLoading(); } });

  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      body: JSON.stringify({ type:"login", num:num, pass:pass, deviceId:deviceId })
    });
    const out = await res.json();

    if (out.status === "success") {
      saveSession(out.user);
      Swal.fire({
        title:"Login Successful!",
        text:"Welcome, " + (out.user.name || "") + "!",
        icon:"success", timer:1500, showConfirmButton:false
      });
      setTimeout(function(){ window.location.replace("dashboard.html"); }, 1600);
    } else {
      Swal.fire({ title:"Access Denied", text:out.message || "Login failed", icon:"error" });
    }
  } catch(e) {
    Swal.fire({ title:"Error", text:"Connection failed. Try again.", icon:"error" });
  }
}

// ─── REGISTER ───────────────────────────────────────────
async function doRegister() {
  const name     = document.getElementById("r-name").value.trim();
  const num      = document.getElementById("r-num").value.trim();
  const pass     = document.getElementById("r-pass").value.trim();
  const ref      = document.getElementById("r-ref").value.trim().toUpperCase() || "DIRECT";
  const deviceId = getDeviceId();

  if (!name || !num || !pass)
    return Swal.fire({ title:"Error", text:"Tamam fields bharen", icon:"error" });
  if (pass.length < 5)
    return Swal.fire({ title:"Weak Password", text:"Kam se kam 5 characters chahiye", icon:"warning" });
  if (!document.getElementById("terms-chk").checked)
    return Swal.fire({ title:"Terms", text:"Terms & Conditions agree karein", icon:"warning" });

  Swal.fire({ title:"Creating Account...", allowOutsideClick:false, didOpen:function(){ Swal.showLoading(); } });

  try {
    const res = await fetch(GAS_URL, {
      method :"POST",
      
      body   : JSON.stringify({
        type    : "register",
        name    : name,
        number  : num,
        password: pass,
        referral: ref,
        device_id: deviceId
      })
    });
    const out = await res.json();

    if (out.status === "success") {
      // ✅ GAS now returns full user object on register
      const userObj = out.user || { user_id:out.user_id, name:name, number:num, balance:0, referral:ref };
      saveSession(userObj);

      Swal.fire({
        title:"Registration Successful! 🎉",
        html :"Your ID: <b style='color:#fbbf24;font-size:20px;'>" + out.user_id + "</b>",
        icon :"success", timer:2500, showConfirmButton:false
      });
      setTimeout(function(){ window.location.replace("dashboard.html"); }, 2600);
    } else {
      Swal.fire({ title:"Failed", text:out.message || "Registration failed", icon:"error" });
    }
  } catch(e) {
    Swal.fire({ title:"Network Error", text:"Connection failed. Try again.", icon:"error" });
  }
}
</script>
</body>
</html>
