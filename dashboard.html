<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Power Star | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- ✅ AUTH GUARD — سب سے پہلے چلتا ہے، کوئی logic خراب نہیں -->
    <script>
    (function() {
        // نئی index.html "psUser" save کرتی ہے
        // پرانی dashboard "ps_user" پڑھتی ہے
        // یہ bridge دونوں کو جوڑتا ہے ↓

        var newKey  = localStorage.getItem("psUser");      // نئی key
        var oldKey  = localStorage.getItem("ps_user");     // پرانی key
        var loggedIn = localStorage.getItem("psLoggedIn"); // login flag

        // اگر نئی key ہے تو پرانی key میں بھی copy کرو
        if (newKey && !oldKey) {
            localStorage.setItem("ps_user", newKey);
            oldKey = newKey;
        }

        // اگر پرانی key ہے تو نئی میں بھی copy کرو
        if (oldKey && !newKey) {
            localStorage.setItem("psUser", oldKey);
            localStorage.setItem("psLoggedIn", "true");
        }

        // اب چیک کرو — دونوں میں سے کوئی بھی ہو تو ٹھیک ہے
        var userData = oldKey || newKey;
        if (!userData) {
            window.location.replace("auth.html");
        }
    })();
    </script>

    <style>
        :root { 
            --gold: #fbbf24; --gold-dark: #d97706; --bg: #0a0e1a; 
            --card: #1a1f35; --border: #2d3548; --card-dark: #151929;
            --text-secondary: #94a3b8;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        .header { padding: 20px; background: #131829; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .user-meta { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; background: #0f1423; font-size: 12px; border-bottom: 1px solid var(--border); }
        .id-badge { background: rgba(251, 191, 36, 0.1); color: var(--gold); padding: 4px 10px; border-radius: 8px; border: 1px solid rgba(251, 191, 36, 0.3); font-weight: 700; }
        .balance-card { background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%); padding: 30px 25px; border-radius: 24px; margin: 20px; box-shadow: 0 15px 35px rgba(217, 119, 6, 0.2); text-align: center; position: relative; }
        .history-icon { position: absolute; right: 20px; top: 20px; color: #fff; background: rgba(0,0,0,0.15); padding: 10px; border-radius: 50%; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .income-btn { background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.3); color: #0a0e1a; padding: 10px 20px; border-radius: 12px; font-weight: 700; font-size: 13px; cursor: pointer; margin-top: 15px; display: inline-block; }
        .history-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.85); z-index: 9999; align-items: center; justify-content: center; padding: 20px; }
        .history-modal.show { display: flex; }
        .history-content { background: var(--card); border-radius: 20px; border: 1px solid var(--border); max-width: 500px; width: 100%; max-height: 80vh; overflow-y: auto; position: relative; }
        .history-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--card); z-index: 1; }
        .history-header h3 { font-size: 18px; font-weight: 800; color: var(--gold); }
        .close-modal { background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; color: #ef4444; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; }
        .history-body { padding: 15px 20px; }
        .history-item { background: var(--card-dark); padding: 14px; border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .history-type { font-size: 14px; font-weight: 700; color: #fff; }
        .history-amount { font-size: 16px; font-weight: 900; color: var(--gold); }
        .news-box { margin: 0 20px 25px; background: rgba(251, 191, 36, 0.1); border: 1px solid rgba(251, 191, 36, 0.3); padding: 10px; border-radius: 12px; display: flex; align-items: center; }
        .news-box marquee { font-size: 13px; font-weight: 600; color: #fff; }
        .media-container { margin: 0 20px; background: var(--card); border-radius: 24px; padding: 12px; border: 1px solid var(--border); }
        .media-content { width: 100%; height: 220px; background: #000; border-radius: 16px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .media-content img, .media-content video { width: 100%; height: 100%; object-fit: cover; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #131829; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-link { color: var(--text-secondary); text-decoration: none; font-size: 10px; text-align: center; }
        .nav-link i { font-size: 20px; display: block; margin-bottom: 4px; }
        .nav-link.active { color: var(--gold); }
    </style>
</head>
<body>

    <div class="header">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="font-weight:800; font-size: 20px; margin:0;">POWER <span style="color:var(--gold)">STAR</span></h2>
            <div style="display: flex; gap: 15px; align-items: center;">
                <i class="fa-solid fa-headset" style="color: var(--gold); font-size: 18px;"></i>
                <i class="fa-solid fa-right-from-bracket" onclick="logout()" style="color: #ef4444; font-size: 18px; cursor:pointer;"></i>
            </div>
        </div>
    </div>

    <div class="user-meta">
        <span id="u-name" style="font-weight: 600; color: var(--text-secondary);">Loading...</span>
        <div class="id-badge" style="display: flex; align-items: center; gap: 6px; cursor: pointer;" onclick="copyID()">
            <span id="u-id">PS####</span>
            <i class="fa-regular fa-copy" style="font-size: 10px; opacity: 0.8;"></i>
        </div>
    </div>

    <div class="balance-card">
        <div class="history-icon" onclick="openHistory()">
            <i class="fa-solid fa-clock-rotate-left"></i>
        </div>
        <p style="font-size:13px; font-weight:600; opacity:0.8; margin-bottom:5px;">Available Balance</p>
        <h1 style="font-size:35px; font-weight:900; margin:0;">Rs. <span id="u-bal">0.00</span></h1>
        <div class="income-btn" onclick="showIncome()">
            <i class="fa-solid fa-sack-dollar"></i> View Income
        </div>
    </div>

    <div class="news-box">
        <span style="background:var(--gold); color:#000; padding:3px 8px; border-radius:6px; font-size:10px; font-weight:800; margin-right:10px;">NEWS</span>
        <marquee id="news-text">Syncing with server...</marquee>
    </div>

    <div class="media-container">
        <div class="media-content" id="media-content">
            <i class="fa-solid fa-circle-notch fa-spin" style="font-size:40px; color:var(--gold); opacity:0.5;"></i>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="dashboard.html" class="nav-link active"><i class="fa-solid fa-house"></i>Home</a>
        <a href="https://sweramps-blip.github.io/Markeeting-/" class="nav-link"><i class="fa-solid fa-chart-simple"></i>Marketing</a>
        <a href="team.html" class="nav-link"><i class="fa-solid fa-users-viewfinder"></i>Team</a>
        <a href="wallet.html" class="nav-link"><i class="fa-solid fa-wallet"></i>Wallet</a>
    </nav>

    <div class="history-modal" id="history-modal">
        <div class="history-content">
            <div class="history-header">
                <h3><i class="fa-solid fa-history"></i> Transaction History</h3>
                <button class="close-modal" onclick="closeHistory()">CLOSE</button>
            </div>
            <div class="history-body" id="history-body">
                <p style="text-align: center; color: #64748b; padding: 30px;">Loading...</p>
            </div>
        </div>
    </div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxSF7kNSn0aJkuuDVVMVchE_5lPrKVCRW2jem9YoV1lrBt9QZuQZeXiReM6OgBwBgQB/exec";

// ══ SPEED FIX: Cache keys
const CACHE_USER     = "ps_cached_user";
const CACHE_SETTINGS = "ps_cached_settings";
const CACHE_TIME     = "ps_cache_ts";
const CACHE_TTL      = 5 * 60 * 1000; // 5 minutes

function getUser() {
    try { return JSON.parse(localStorage.getItem("psUser") || localStorage.getItem("ps_user") || "null"); }
    catch(e) { return null; }
}

// ══ INSTANT UI — localStorage se 0ms mein dikhao
function renderUser(u) {
    if (!u) return;
    document.getElementById("u-name").innerText = u.name    || "User";
    document.getElementById("u-id").innerText   = u.user_id || "PS####";
    document.getElementById("u-bal").innerText  = parseFloat(u.balance || 0).toFixed(2);
}

// ══ INSTANT SETTINGS — cached settings 0ms mein dikhao
function renderSettings(s) {
    if (!s) return;
    if (s.news) {
        const nm = document.getElementById("news-text");
        if (nm) nm.innerHTML = s.news;
    }
    if (s.media_link) {
        const mediaBox = document.getElementById("media-content");
        if (!mediaBox) return;
        const type = s.media_type || "image";
        const link = s.media_link;
        if (type === "video") {
            let fl = link;
            if (link.includes("dropbox.com")) fl = link.replace("dl=0","raw=1");
            else if (link.includes("drive.google.com")) {
                let id = link.includes("/d/") ? link.split("/d/")[1].split("/")[0]
                       : link.includes("id=") ? link.split("id=")[1].split("&")[0] : "";
                if (id) fl = "https://drive.google.com/uc?export=download&id=" + id;
            }
            mediaBox.innerHTML = '<video autoplay muted loop playsinline style="width:100%;height:100%;object-fit:fill;border-radius:16px;pointer-events:none;"><source src="' + fl + '" type="video/mp4"></video>';
        } else {
            mediaBox.innerHTML = '<img src="' + link + '" style="width:100%;height:100%;object-fit:cover;border-radius:16px;" loading="lazy">';
        }
    }
}

// ══ MAIN SYNC
async function syncDashboard() {
    const localUser = getUser();
    if (!localUser) { window.location.replace("auth.html"); return; }

    // ✅ STEP 1: Instant render from localStorage (0ms)
    renderUser(localUser);

    // ✅ STEP 2: Show cached settings instantly (0ms)
    try {
        const cachedSettings = JSON.parse(localStorage.getItem(CACHE_SETTINGS) || "null");
        if (cachedSettings) renderSettings(cachedSettings);
    } catch(e) {}

    // ✅ STEP 3: Check if cache is fresh (skip GAS call if < 5 min old)
    const lastFetch = parseInt(localStorage.getItem(CACHE_TIME) || "0");
    const now       = Date.now();
    if ((now - lastFetch) < CACHE_TTL) return; // Still fresh — no GAS call needed

    // ✅ STEP 4: Background update from GAS (user does not wait)
    try {
        const res  = await fetch(API_URL + "?type=get_dashboard&userId=" + encodeURIComponent(localUser.user_id || ""));
        const data = await res.json();

        if (data.status === "success") {
            // Update balance if changed
            if (data.user) {
                const merged = Object.assign({}, localUser, data.user);
                localStorage.setItem("psUser",  JSON.stringify(merged));
                localStorage.setItem("ps_user", JSON.stringify(merged));
                localStorage.setItem("psID",    merged.user_id);
                renderUser(merged);
            }
            // Cache + render settings
            if (data.settings) {
                localStorage.setItem(CACHE_SETTINGS, JSON.stringify(data.settings));
                renderSettings(data.settings);
            }
            // Update cache timestamp
            localStorage.setItem(CACHE_TIME, String(now));
        }
    } catch(e) {
        console.log("Background sync failed:", e.message);
    }
}

async function openHistory() {
    document.getElementById("history-modal").classList.add("show");
    const hb = document.getElementById("history-body");

    // ✅ STEP 1: Cache se foran dikhao (0ms delay)
    try {
        const cached = JSON.parse(localStorage.getItem("ps_cached_history") || "null");
        if (cached && cached.length) {
            renderHistory(hb, cached);
            // ✅ STEP 2: Background mein silently update karo
            const localUser = getUser();
            if (localUser) {
                fetch(API_URL + "?type=get_history&userId=" + encodeURIComponent(localUser.user_id || ""))
                .then(function(r){ return r.json(); })
                .then(function(data){
                    if (data.status === "success" && data.history && data.history.length) {
                        localStorage.setItem("ps_cached_history", JSON.stringify(data.history));
                        renderHistory(hb, data.history);
                    }
                }).catch(function(){});
            }
            return;
        }
    } catch(e) {}
    hb.innerHTML = '<p style="text-align:center;padding:30px;color:#64748b;"><i class="fas fa-spinner fa-spin"></i> Loading...</p>';
    const localUser = getUser();
    if (!localUser) return;
    try {
        const res  = await fetch(API_URL + "?type=get_history&userId=" + encodeURIComponent(localUser.user_id || ""));
        const data = await res.json();
        if (data.status !== "success" || !data.history || !data.history.length) {
            hb.innerHTML = '<p style="text-align:center;padding:30px;color:#64748b;">No history yet.</p>'; return;
        }
        localStorage.setItem("ps_cached_history", JSON.stringify(data.history));
        renderHistory(hb, data.history);
    } catch(e) { hb.innerHTML = '<p style="text-align:center;padding:20px;color:#ef4444;">Load failed.</p>'; }
}

function renderHistory(hb, list) {
    const colorMap = {"Salary":"#22c55e","Commission":"#3b82f6","Reward":"#a855f7","Bonus":"#f97316","Withdrawal":"#fbbf24","Rejected":"#ef4444","Deduction":"#ef4444"};
    let html = "";
    list.forEach(function(h) {
        const color = colorMap[h.type] || "#94a3b8";
        const sign  = (h.type==="Withdrawal"||h.type==="Rejected"||h.type==="Deduction") ? "- " : "+ ";
        const date  = new Date(h.date).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
        html += '<div class="history-item"><div><div class="history-type">' + (h.title||h.type) + '</div><div style="font-size:11px;color:#64748b;margin-top:3px;">' + date + '</div></div><div style="text-align:right"><div class="history-amount" style="color:' + color + '">' + sign + 'Rs. ' + parseFloat(h.amount).toFixed(2) + '</div>' + (h.status ? '<div style="font-size:11px;font-weight:700;color:' + color + '">' + h.status + '</div>' : '') + '</div></div>';
    });
    hb.innerHTML = html;
}

function closeHistory() {
    document.getElementById("history-modal").classList.remove("show");
    // Refresh history next open
    localStorage.removeItem("ps_cached_history");
}

function showIncome() {
    const user = getUser();
    Swal.fire({
        title: '<strong>💰 Your Income</strong>',
        html: '<div style="text-align:left;padding:10px;"><p><b>Balance:</b> Rs. ' + parseFloat(user.balance||0).toFixed(2) + '</p><p><b>User ID:</b> ' + user.user_id + '</p></div>',
        icon: 'info', confirmButtonColor: '#fbbf24'
    });
}

function logout() {
    ["ps_user","psUser","psLoggedIn","psID","ps_cached_settings","ps_cached_history","ps_cache_ts"].forEach(function(k){ localStorage.removeItem(k); });
    window.location.replace("auth.html");
}

function copyID() {
    const idText = document.getElementById("u-id").innerText;
    navigator.clipboard.writeText(idText).then(function() {
        Swal.mixin({ toast:true, position:'top-end', showConfirmButton:false, timer:2000, background:'#1a1f35', color:'#fff' })
        .fire({ icon:'success', title:'ID Copied: ' + idText });
    });
}

// ✅ Background prefetch - page load ke 1.5s baad silently history fetch karo
async function prefetchHistory() {
    const localUser = getUser();
    if (!localUser || !localUser.user_id) return;
    try {
        const res  = await fetch(API_URL + '?type=get_history&userId=' + encodeURIComponent(localUser.user_id));
        const data = await res.json();
        if (data.status === 'success' && data.history && data.history.length) {
            localStorage.setItem('ps_cached_history', JSON.stringify(data.history));
        }
    } catch(e) {}
}

document.addEventListener('DOMContentLoaded', function() {
    syncDashboard();
    // History background mein prefetch ho — click pe instant dikhe
    setTimeout(prefetchHistory, 1500);
});
</script>
</body>
</html>
